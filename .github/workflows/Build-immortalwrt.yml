name: 🔧 ImmortalWrt AutoBuilder

on:
  schedule:
    # 北京时间每周一和每周三中午12点运行（UTC时间每周一和周三凌晨4点）
    - cron: '0 4 * * 1,3'
  workflow_dispatch:
  push:
    paths:
      - 'config/*'
      - 'zdy_pkg/*'
      - 'zdy_fk_pkg/*'

jobs:
  config:
    name: ⚙️ Load Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: 🛬 Checkout Repository
      uses: actions/checkout@main

    - name: 🔍 Validate Config Files
      run: |
        echo "::group::Validating configuration files"
        CONFIG_FILES=(
          "config/devices.json"
          "config/version.json"
          "config/device_targets.json"
          "config/use_mirrors.json"
        )

        MISSING_FILES=()
        for file in "${CONFIG_FILES[@]}"; do
          if [ ! -f "$file" ]; then
            MISSING_FILES+=("$file")
          fi
        done

        if [ ${#MISSING_FILES[@]} -ne 0 ]; then
          echo "::error::Missing required config files: ${MISSING_FILES[*]}"
          exit 1
        fi

        # 验证JSON格式
        for file in "${CONFIG_FILES[@]}"; do
          if ! jq empty "$file" 2>/dev/null; then
            echo "::error::Invalid JSON in $file"
            exit 1
          fi
        done
        echo "Config files validation passed ✅"
        echo "::endgroup::"

    - name: 📋 Read Configuration
      id: set-matrix
      run: |
        echo "::group::Reading configuration data"
        if jq -e '.devices' config/devices.json >/dev/null 2>&1; then
          DEVICES=$(jq -r '.devices[]' config/devices.json)
        else
          DEVICES=$(jq -r '.[]' config/devices.json)
        fi

        VERSION=$(jq -r '.version' config/version.json)

        MATRIX_JSON=$(jq -n -c \
          --argjson devices "$(jq -n -c --arg in "$DEVICES" '$in | split("\n") | map(select(. != ""))')" \
          --arg version "$VERSION" \
          '{
            include: $devices | map({
              device: .,
              version: $version
            })
          }')

        echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
        echo "::notice::Build matrix generated for $VERSION: $MATRIX_JSON"
        echo "::endgroup::"

  build-firmware:
    name: 🔨 Build ${{ matrix.device }}
    needs: config
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.config.outputs.matrix) }}
      fail-fast: false

    steps:
    - name: 🛬 Checkout Repository
      uses: actions/checkout@main

    - name: 📅 Get Build Date (CST)
      id: get-date
      run: |
        echo "::group::Getting build date"
        TZ='Asia/Shanghai'
        build_date=$(TZ=$TZ date +'%Y-%m-%d %H:%M:%S %Z')
        formatted_date=$(TZ=$TZ date +'%Y%m%d%H%M%S')
        timestamp=$(TZ=$TZ date +%s)
        echo "date=$build_date" >> $GITHUB_OUTPUT
        echo "formatted_date=$formatted_date" >> $GITHUB_OUTPUT
        echo "timestamp=$timestamp" >> $GITHUB_OUTPUT
        echo "::notice::Build date: $formatted_date"
        echo "::endgroup::"

    - name: 🔧 Setup Build Environment
      run: |
        echo "::group::Setting up build environment"
        sudo apt-get update -y
        sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 jq zstd axel coreutils openssl rhash curl dnsutils
        sudo apt-get install -y libncursesw5-dev zlib1g-dev genisoimage xsltproc rsync wget unzip dnsmasq stunnel4 net-tools resolvconf python3 python3-pip python3-venv iptables-persistent net-tools
        echo "::endgroup::"

    - name: 🗺️ Read Device Target Mapping from Config
      id: target
      run: |
        echo "::group::Reading device target mapping"
        DEVICE="${{ matrix.device }}"

        # 从配置文件读取设备映射
        if [ -f "config/device_targets.json" ]; then
          TARGET=$(jq -r --arg device "$DEVICE" '.[$device]' config/device_targets.json 2>/dev/null)

          if [ "$TARGET" = "null" ] || [ -z "$TARGET" ]; then
            echo "::error::Device $DEVICE not found in config/device_targets.json"
            echo "::error::Available devices in config:"
            jq -r 'keys[]' config/device_targets.json
            exit 1
          fi
        else
          echo "::error::config/device_targets.json not found!"
          exit 1
        fi

        echo "target=$TARGET" >> $GITHUB_OUTPUT
        echo "sanitized_target=${TARGET//\//-}" >> $GITHUB_OUTPUT
        echo "::notice::Target for $DEVICE: $TARGET"
        echo "::endgroup::"

    # ===== 新增镜像源检测步骤 =====
    - name: 🔍 Test Primary URL and Check Mirror Settings
      id: test-primary-url
      run: |
        echo "::group::Testing primary URL and checking mirror settings"
        SANITIZED_TARGET="${{ steps.target.outputs.sanitized_target }}"
        VERSION="${{ matrix.version }}"

        # 构建主URL
        BASE_URL="https://downloads.immortalwrt.org/releases/$VERSION/targets/${{ steps.target.outputs.target }}"

        URLS=(
          "$BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
          "$BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
          "$BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
          "$BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
        )

        PRIMARY_AVAILABLE=false
        for URL in "${URLS[@]}"; do
          echo "🔍 Testing primary URL: $URL"
          if curl -Ls --connect-timeout 10 --max-time 30 --head "$URL" -w "%{http_code}" -o /dev/null | grep -q "200"; then
            echo "✅ Primary URL available: $URL"
            PRIMARY_AVAILABLE=true
            break
          else
            echo "❌ Primary URL not available: $URL"
          fi
        done

        # 读取镜像使用配置
        USE_MIRRORS=$(jq -r '.use_mirrors' config/use_mirrors.json)
        echo "🌐 Use mirrors setting: $USE_MIRRORS"

        if [ "$PRIMARY_AVAILABLE" = true ]; then
          echo "primary_available=true" >> $GITHUB_OUTPUT
          echo "use_mirrors=false" >> $GITHUB_OUTPUT
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT
          echo "url_found=$URL" >> $GITHUB_OUTPUT
          echo "::notice::Primary URL is available, proceeding without mirrors"
        elif [ "$USE_MIRRORS" = "true" ]; then
          echo "primary_available=false" >> $GITHUB_OUTPUT
          echo "use_mirrors=true" >> $GITHUB_OUTPUT
          echo "::notice::Primary URL not available, will try mirrors"
        else
          echo "primary_available=false" >> $GITHUB_OUTPUT
          echo "use_mirrors=false" >> $GITHUB_OUTPUT
          echo "::error::Primary URL not available and mirrors disabled"
          exit 1
        fi
        echo "::endgroup::"

    - name: 🌐 Test Mirror URLs
      id: test-mirrors
      if: steps.test-primary-url.outputs.primary_available == 'false'
      run: |
        echo "::group::Testing mirror URLs"
        SANITIZED_TARGET="${{ steps.target.outputs.sanitized_target }}"
        VERSION="${{ matrix.version }}"

        # 读取镜像列表
        if [ ! -f "config/mirrors_list.txt" ]; then
          echo "::error::config/mirrors_list.txt not found!"
          exit 1
        fi

        MIRRORS=()
        while IFS= read -r line; do
          if [ -n "$line" ] && [[ ! "$line" =~ ^[[:space:]]*# ]]; then
            MIRRORS+=("$line")
          fi
        done < config/mirrors_list.txt

        if [ ${#MIRRORS[@]} -eq 0 ]; then
          echo "::error::No valid mirrors found in config/mirrors_list.txt"
          exit 1
        fi

        echo "::notice::Found ${#MIRRORS[@]} mirrors to test"

        # 测试每个镜像
        MIRROR_BASE_URL=""
        URL_FOUND=""
        USED_MIRROR=""
        for MIRROR in "${MIRRORS[@]}"; do
          echo "🔍 Testing mirror: $MIRROR"

          # 替换URL中的主域名
          TEST_BASE_URL="${MIRROR}/releases/$VERSION/targets/${{ steps.target.outputs.target }}"

          URLS=(
            "$TEST_BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
            "$TEST_BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
            "$TEST_BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
            "$TEST_BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
          )

          for URL in "${URLS[@]}"; do
            echo "🔍 Testing mirror URL: $URL"
            if curl -Ls --connect-timeout 10 --max-time 30 --head "$URL" -w "%{http_code}" -o /dev/null | grep -q "200"; then
              echo "✅ Mirror URL available: $URL"
              MIRROR_BASE_URL="$TEST_BASE_URL"
              URL_FOUND="$URL"
              USED_MIRROR="$MIRROR"
              break 2
            else
              echo "❌ Mirror URL not available: $URL"
            fi
          done
        done

        if [ -n "$MIRROR_BASE_URL" ]; then
          echo "base_url=$MIRROR_BASE_URL" >> $GITHUB_OUTPUT
          echo "url_found=$URL_FOUND" >> $GITHUB_OUTPUT
          echo "used_mirror=$USED_MIRROR" >> $GITHUB_OUTPUT
          echo "mirrors_available=true" >> $GITHUB_OUTPUT
          echo "::notice::Successfully found working mirror: $USED_MIRROR"
        else
          echo "mirrors_available=false" >> $GITHUB_OUTPUT
          echo "::error::No mirrors are available"
          exit 1
        fi
        echo "::endgroup::"

    - name: 📦 Download ImageBuilder (with axel) - Using Mirrors
      id: download-mirror
      if: steps.test-primary-url.outputs.primary_available == 'false' && steps.test-mirrors.outputs.mirrors_available == 'true'
      run: |
        echo "::group::Downloading ImageBuilder using mirror"
        SANITIZED_TARGET="${{ steps.target.outputs.sanitized_target }}"
        VERSION="${{ matrix.version }}"
        BASE_URL="${{ steps.test-mirrors.outputs.base_url }}"

        # 使用镜像源下载
        URLS=(
          "$BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
          "$BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
          "$BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
          "$BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
        )

        FOUND=0
        for URL in "${URLS[@]}"; do
          echo "🔍 Checking: $URL"
          if curl -Ls --connect-timeout 10 --max-time 30 --head "$URL" -w "%{http_code}" -o /dev/null | grep -q "200"; then
            echo "✅ Found valid ImageBuilder at: $URL"
            # 使用axel加速下载（8线程）
            echo "🚀 Downloading with axel (8 threads)..."
            axel -n 8 -o immortalwrt_imagebuilder/imagebuilder.tar.zst "$URL"

            # 检查axel下载是否成功且文件完整
            if [ $? -eq 0 ] && [ -f "immortalwrt_imagebuilder/imagebuilder.tar.zst" ] && [ $(stat -c%s "immortalwrt_imagebuilder/imagebuilder.tar.zst") -gt 1000000 ]; then
              echo "✅ Axel download completed and file size seems valid"
              FOUND=1
              break
            else
              echo "⚠️ Axel download may have failed or file is too small, checking file..."
              if [ -f "immortalwrt_imagebuilder/imagebuilder.tar.zst" ]; then
                echo "📊 File size: $(stat -c%s "immortalwrt_imagebuilder/imagebuilder.tar.zst") bytes"
              fi
              echo "🔄 Trying with wget as fallback..."
              wget -O immortalwrt_imagebuilder/imagebuilder.tar.zst "$URL" && {
                if [ -f "immortalwrt_imagebuilder/imagebuilder.tar.zst" ] && [ $(stat -c%s "immortalwrt_imagebuilder/imagebuilder.tar.zst") -gt 1000000 ]; then
                  echo "✅ Wget download completed successfully"
                  FOUND=1
                  break
                else
                  echo "⚠️ Wget download also failed or file too small"
                fi
              }
            fi
          fi
        done

        if [ "$FOUND" -eq 0 ]; then
          echo "::error::ImageBuilder not found or download failed at any URL"
          for URL in "${URLS[@]}"; do
            echo "::error::Tried: $URL"
          done
          exit 1
        fi
        echo "::endgroup::"

    - name: 📦 Download ImageBuilder (with axel) - Using Primary
      id: download-primary
      if: steps.test-primary-url.outputs.primary_available == 'true'
      run: |
        echo "::group::Downloading ImageBuilder using primary source"
        SANITIZED_TARGET="${{ steps.target.outputs.sanitized_target }}"
        VERSION="${{ matrix.version }}"
        BASE_URL="${{ steps.test-primary-url.outputs.base_url }}"

        # 使用官方下载源
        URLS=(
          "$BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
          "$BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.zst"
          "$BASE_URL/immortalwrt-imagebuilder-$VERSION-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
          "$BASE_URL/immortalwrt-imagebuilder-$SANITIZED_TARGET.Linux-x86_64.tar.xz"
        )

        FOUND=0
        for URL in "${URLS[@]}"; do
          echo "🔍 Checking: $URL"
          if curl -Ls --connect-timeout 10 --max-time 30 --head "$URL" -w "%{http_code}" -o /dev/null | grep -q "200"; then
            echo "✅ Found valid ImageBuilder at: $URL"
            # 使用axel加速下载（64线程）
            echo "🚀 Downloading with axel (64 threads)..."
            axel -n 64 -o immortalwrt_imagebuilder/imagebuilder.tar.zst "$URL"

            # 检查axel下载是否成功且文件完整
            if [ $? -eq 0 ] && [ -f "immortalwrt_imagebuilder/imagebuilder.tar.zst" ] && [ $(stat -c%s "immortalwrt_imagebuilder/imagebuilder.tar.zst") -gt 1000000 ]; then
              echo "✅ Axel download completed and file size seems valid"
              FOUND=1
              break
            else
              echo "⚠️ Axel download may have failed or file is too small, checking file..."
              if [ -f "immortalwrt_imagebuilder/imagebuilder.tar.zst" ]; then
                echo "📊 File size: $(stat -c%s "immortalwrt_imagebuilder/imagebuilder.tar.zst") bytes"
              fi
              echo "🔄 Trying with wget as fallback..."
              wget -O immortalwrt_imagebuilder/imagebuilder.tar.zst "$URL" && {
                if [ -f "immortalwrt_imagebuilder/imagebuilder.tar.zst" ] && [ $(stat -c%s "immortalwrt_imagebuilder/imagebuilder.tar.zst") -gt 1000000 ]; then
                  echo "✅ Wget download completed successfully"
                  FOUND=1
                  break
                else
                  echo "⚠️ Wget download also failed or file too small"
                fi
              }
            fi
          fi
        done

        if [ "$FOUND" -eq 0 ]; then
          echo "::error::ImageBuilder not found or download failed at any URL"
          for URL in "${URLS[@]}"; do
            echo "::error::Tried: $URL"
          done
          exit 1
        fi
        echo "::endgroup::"

    - name: 📋 Set Downloaded File Path
      id: set-file-path
      run: |
        if [ "${{ steps.test-primary-url.outputs.primary_available }}" = "true" ]; then
          echo "downloaded_file=immortalwrt_imagebuilder/imagebuilder.tar.zst" >> $GITHUB_OUTPUT
        elif [ "${{ steps.test-mirrors.outputs.mirrors_available }}" = "true" ]; then
          echo "downloaded_file=immortalwrt_imagebuilder/imagebuilder.tar.zst" >> $GITHUB_OUTPUT
        else
          echo "::error::No download was performed"
          exit 1
        fi

    - name: 📦 Extract ImageBuilder
      run: |
        echo "::group::Extracting ImageBuilder"
        DOWNLOADED_FILE="${{ steps.set-file-path.outputs.downloaded_file }}"
        echo "🔍 Using file: $DOWNLOADED_FILE"

        if [ ! -f "$DOWNLOADED_FILE" ]; then
          echo "::error::Downloaded ImageBuilder archive not found at $DOWNLOADED_FILE!"
          ls -la immortalwrt_imagebuilder/ || true
          exit 1
        fi

        FILESIZE=$(stat -c%s "$DOWNLOADED_FILE")
        echo "📊 Archive size: $FILESIZE bytes"

        if [ "$FILESIZE" -lt 1000000 ]; then
          echo "::error::Archive file is too small (可能下载中断)"
          exit 1
        fi

        # 创建临时目录进行解压
        mkdir -p temp_extract
        cd temp_extract

        if file "$OLDPWD/$DOWNLOADED_FILE" | grep -q "Zstandard"; then
          echo "🔧 Extracting Zstandard archive"
          tar -I zstd -xf "$OLDPWD/$DOWNLOADED_FILE"
        elif file "$OLDPWD/$DOWNLOADED_FILE" | grep -q "XZ"; then
          echo "🔧 Extracting XZ archive"
          tar -xJf "$OLDPWD/$DOWNLOADED_FILE"
        elif file "$OLDPWD/$DOWNLOADED_FILE" | grep -q "gzip"; then
          echo "🔧 Extracting gzip archive"
          tar -xzf "$OLDPWD/$DOWNLOADED_FILE"
        else
          echo "⚠️ Unknown archive format, trying general extraction..."
          tar -xf "$OLDPWD/$DOWNLOADED_FILE" || {
          echo "::error::Failed to extract archive"
          exit 1
        }
        fi

        # 移动解压后的目录到工作目录
        mv immortalwrt-imagebuilder-* ../imagebuilder
        cd ..
        rm -rf temp_extract
        echo "✅ ImageBuilder extracted successfully"
        echo "::endgroup::"

    # ===== 更新repositories.conf中的URL =====
    - name: 🔗 Update repositories.conf with Mirror URL
      if: steps.test-mirrors.outputs.used_mirror != ''
      run: |
        echo "::group::Updating repositories.conf with mirror URL"
        USED_MIRROR="${{ steps.test-mirrors.outputs.used_mirror }}"
        VERSION="${{ matrix.version }}"

        if [ -f "imagebuilder/repositories.conf" ]; then
          # 替换repositories.conf中的官方源为镜像源
          sed -i "s|https://downloads.immortalwrt.org|${USED_MIRROR}|g" imagebuilder/repositories.conf
          sed -i "s|http://downloads.immortalwrt.org|${USED_MIRROR}|g" imagebuilder/repositories.conf

          # 显示更新后的repositories.conf内容
          echo "📋 Updated repositories.conf:"
          cat imagebuilder/repositories.conf
          echo "::notice::Updated repositories.conf with mirror: $USED_MIRROR"
        else
          echo "::warning::imagebuilder/repositories.conf not found"
        fi
        echo "::endgroup::"

    # ===== 新增步骤：设置最终使用的镜像信息 =====
    - name: 🌐 Set Final Mirror Info
      id: final-mirror-info
      run: |
        echo "::group::Setting final mirror information"
        # 如果使用了镜像，从test-mirrors步骤获取；否则设置为None
        if [ "${{ steps.test-mirrors.outputs.used_mirror }}" != "" ]; then
          echo "final_used_mirror=${{ steps.test-mirrors.outputs.used_mirror }}" >> $GITHUB_OUTPUT
          echo "::notice::Final mirror used: ${{ steps.test-mirrors.outputs.used_mirror }}"
        else
          echo "final_used_mirror=None" >> $GITHUB_OUTPUT
          echo "::notice::No mirror used, using primary source"
        fi
        echo "::endgroup::"

    # ===== 新增的自定义软件包复制步骤 =====
    - name: 📥 Copy Custom Packages
      id: custom-pkgs
      run: |
        echo "::group::Copying custom packages"
        echo "🔍 Checking for custom package configuration..."
        PKG_DIR="$GITHUB_WORKSPACE/imagebuilder/packages"
        mkdir -p "$PKG_DIR"

        # 检查设备是否在自定义列表中
        check_device_in_list() {
          local list_file="$1"
          if [ -f "$list_file" ]; then
            if grep -qE "^\s*${{ matrix.device }}\s*$" "$list_file"; then
              echo "✅ Device ${{ matrix.device }} found in $list_file"
              return 0
            else
              echo "ℹ️ Device ${{ matrix.device }} NOT found in $list_file"
            fi
          else
            echo "ℹ️ $list_file not found"
          fi
          return 1
        }

        # 处理主自定义包
        if check_device_in_list "zdy_rjb.txt"; then
          if [ -d "zdy_pkg" ]; then
            echo "📦 Copying custom packages from zdy_pkg to $PKG_DIR"
            find zdy_pkg -name '*.ipk' -exec cp -v {} "$PKG_DIR" \;
          else
            echo "⚠️ zdy_pkg directory not found"
          fi
        fi

        # 处理分控自定义包
        if check_device_in_list "zdy_rjb_fk.txt"; then
          if [ -d "zdy_fk_pkg" ]; then
            echo "📦 Copying custom packages from zdy_fk_pkg to $PKG_DIR"
            find zdy_fk_pkg -name '*.ipk' -exec cp -v {} "$PKG_DIR" \;
          else
            echo "⚠️ zdy_fk_pkg directory not found"
          fi
        fi

        # 列出复制的包
        echo "📦 Copied packages:"
        ls -lh "$PKG_DIR" || true

        # 设置输出变量用于后续步骤
        if [ -n "$(ls -A "$PKG_DIR")" ]; then
          echo "::notice::Custom packages added to build"
          echo "has_custom_pkgs=true" >> $GITHUB_OUTPUT
        else
          echo "::notice::No custom packages added"
          echo "has_custom_pkgs=false" >> $GITHUB_OUTPUT
        fi
        echo "::endgroup::"
    # ===== 新增步骤结束 =====

    - name: 📦 Prepare Packages
      id: packages
      run: |
        echo "::group::Preparing packages"
        CUSTOM_PKG_FILE="config/packages_${{ matrix.device }}.txt"
        DEFAULT_PKG_FILE="config/default_packages.txt"

        if [ -f "$CUSTOM_PKG_FILE" ]; then
          echo "::notice::Using custom packages for ${{ matrix.device}}"
          # 过滤掉空行和注释行
          PACKAGES=$(grep -vE '^#|^$' "$CUSTOM_PKG_FILE" | tr '\n' ' ')
        elif [ -f "$DEFAULT_PKG_FILE" ]; then
          echo "::notice::Using default packages"
          PACKAGES=$(grep -vE '^#|^$' "$DEFAULT_PKG_FILE" | tr '\n' ' ')
        else
          echo "::error::No package list found!"
          exit 1
        fi

        # 添加必要的基础包
        BASE_PKGS="luci luci-theme-bootstrap -dnsmasq dnsmasq-full"
        FULL_PKGS="$BASE_PKGS $PACKAGES"

        echo "📦 Packages to install: $FULL_PKGS"
        echo "PACKAGES=$FULL_PKGS" >> $GITHUB_ENV
        echo "::endgroup::"

    - name: 🔨 Build Firmware
      run: |
        echo "::group::Building firmware"
        cd imagebuilder
        echo "🚀 Building firmware for ${{ matrix.device }} with packages: $PACKAGES"

        # 获取CPU核心数，限制最大并行数
        NPROC=$(nproc)
        MAX_JOBS=$(( NPROC > 4 ? 4 : NPROC ))

        echo "🔄 Using $MAX_JOBS parallel jobs for downloading"

        if ! make -j$MAX_JOBS image PROFILE="${{ matrix.device }}" PACKAGES="$PACKAGES" FILES="../files/" V=s; then
          echo "::error::Build failed for ${{ matrix.device }}"

          # 收集错误日志
          if [ -d "logs" ]; then
            ERRORS=$(grep -i 'error\|failed\|undefined' logs/*.log | head -n 20 || true)
          else
            ERRORS="No logs directory found"
          fi

          echo "::error::Build errors:"
          echo "$ERRORS"

          exit 1
        fi

        echo "✅ Build completed successfully in parallel mode"
        echo "::endgroup::"

    - name: 🔄 Rename Firmware Files
      id: rename-firmware
      run: |
        echo "::group::Renaming firmware files"
        cd imagebuilder/bin/targets

        # 获取格式化日期
        FORMATTED_DATE="${{ steps.get-date.outputs.formatted_date }}"
        echo "📅 Using formatted date for renaming: $FORMATTED_DATE"

        # 查找所有固件文件
        find . -type f \( -name "*.bin" -o -name "*.img" -o -name "*.itb" -o -name "*.fip" -o -name "*.gz" -o -name "*.trx" \) | while read -r file; do
          # 获取文件所在目录和文件名
          dir=$(dirname "$file")
          filename=$(basename "$file")

          echo "📄 Original filename: $filename"

          # 分析文件名结构并插入日期
          # 原始格式: immortalwrt-24.10.5-mediatek-filogic-glinet_gl-mt3000-squashfs-sysupgrade.bin
          # 新格式: immortalwrt-24.10.5-20250117204610-mediatek-filogic-glinet_gl-mt3000-squashfs-sysupgrade.bin

          if [[ "$filename" =~ ^(immortalwrt-[0-9]+\.[0-9]+\.[0-9]+)-([a-zA-Z0-9_-]+)$ ]]; then
            # 匹配类似: immortalwrt-24.10.5-mediatek-filogic-glinet_gl-mt3000-squashfs-sysupgrade.bin
            prefix="${BASH_REMATCH[1]}"
            suffix="${BASH_REMATCH[2]}"
            new_filename="${prefix}-${FORMATTED_DATE}-${suffix}"
          elif [[ "$filename" =~ ^(immortalwrt-[0-9]+\.[0-9]+\.[0-9]+-)[a-zA-Z0-9_-]+\.(bin|img|itb|fip|gz|trx)$ ]]; then
            # 匹配其他格式，直接插入日期
            base_name="${filename%.*}"
            extension="${filename##*.}"
            new_filename="${base_name}-${FORMATTED_DATE}.${extension}"
          else
            # 如果无法匹配模式，添加日期后缀
            base_name="${filename%.*}"
            extension="${filename##*.}"
            new_filename="${base_name}-${FORMATTED_DATE}.${extension}"
          fi

          # 重命名文件
          echo "🔄 Renaming: $filename -> $new_filename"
          mv "$file" "$dir/$new_filename"
        done

        echo "✅ Firmware files renamed with date: $FORMATTED_DATE"
        echo "::endgroup::"

    - name: 🔢 Calculate Hashes
      id: calculate-hashes
      run: |
        echo "::group::Calculating hashes"
        cd imagebuilder/bin/targets

        # 创建SHA256摘要文件
        SHA256_FILE="sha256sums.txt"
        > "$SHA256_FILE"

        # 查找所有固件文件
        find . -type f \( -name "*.bin" -o -name "*.img" -o -name "*.itb" -o -name "*.fip" -o -name "*.gz" -o -name "*.trx" \) | while read -r file; do
          echo "📄 Calculating hashes for: $file"

          # 获取文件名（不含路径）
          filename=$(basename "$file")

          # 计算各种哈希值
          SHA256=$(sha256sum "$file" | awk '{print $1}')
          SHA512=$(sha512sum "$file" | awk '{print $1}')
          MD5=$(md5sum "$file" | awk '{print $1}')

          # 保存到SHA256摘要文件
          echo "$SHA256  $filename" >> "$SHA256_FILE"

          # 创建详细的哈希文件
          echo "🔐 SHA256: $SHA256" > "$file.hashes"
          echo "🔐 SHA512: $HA512" >> "$file.hashes"
          echo "🔐 MD5: $MD5" >> "$file.hashes"

          # 可选的其他哈希
          echo "🔐 BLAKE2: $(b2sum "$file" | awk '{print $1}')" >> "$file.hashes"
          echo "🔐 SHA1: $(sha1sum "$file" | awk '{print $1}')" >> "$file.hashes"

          # 国密 SM3 (如果可用)
          if command -v openssl &> /dev/null && openssl list -digest-commands 2>/dev/null | grep -q sm3; then
            echo "🔐 SM3: $(openssl sm3 -r "$file" | awk '{print $1}')" >> "$file.hashes"
          fi

          echo "📝 Hashes saved to $file.hashes"
        done

        # 输出SHA256摘要
        echo "📋 SHA256 Digests:"
        cat "$SHA256_FILE"

        # 将SHA256摘要保存到环境变量供发布步骤使用
        SHA256_CONTENT=$(cat "$SHA256_FILE")
        echo "sha256_content<<EOF" >> $GITHUB_OUTPUT
        echo "$SHA256_CONTENT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "::endgroup::"

    - name: 🗜️ Archive Artifacts
      run: |
        echo "::group::Archiving artifacts"
        # 确保在正确的工作目录
        cd "$GITHUB_WORKSPACE"

        # 创建设备目录
        mkdir -p artifacts/${{ matrix.device }}

        # 使用绝对路径查找固件文件和哈希文件
        echo "🔍 Searching for firmware files in imagebuilder/bin/targets..."
        FIRMWARE_FILES=$(find imagebuilder/bin/targets -type f \( -name "*.bin" -o -name "*.img" -o -name "*.gz" -o -name "*.trx" -o -name "*.itb" -o -name "*.fip" -o -name "*.hashes" -o -name "sha256sums.txt" \) 2>/dev/null)

        if [ -n "$FIRMWARE_FILES" ]; then
          echo "✅ Found files:"
          echo "$FIRMWARE_FILES"

          # 复制文件
          echo "$FIRMWARE_FILES" | while read -r file; do
            echo "📦 Copying: $file"
            cp "$file" artifacts/${{ matrix.device }}/
          done
        else
          echo "::error::No firmware files found!"
          echo "::error::Build output directory content:"
          find imagebuilder/bin -type d -ls || true
          exit 1
        fi

        # 检查是否复制了文件
        if [ -z "$(ls -A artifacts/${{ matrix.device }})" ]; then
          echo "::error::No files copied to artifacts directory!"
          echo "::error::Artifacts directory content:"
          ls -la artifacts/${{ matrix.device }}
          exit 1
        else
          echo "✅ Copied $(ls artifacts/${{ matrix.device }} | wc -l) files to artifacts/${{ matrix.device }}"
        fi

        echo "DEVICE=${{ matrix.device }}" >> $GITHUB_ENV
        echo "ARTIFACT_DIR=artifacts/${{ matrix.device }}" >> $GITHUB_ENV
        echo "::endgroup::"

    - name: 🚀 Upload Release
      uses: softprops/action-gh-release@master
      with:
        files: ${{ env.ARTIFACT_DIR }}/*
        tag_name: build-${{ github.run_id }}-${{ matrix.device }}
        name: "Build ${{ github.run_number }} (${{ matrix.device }})"
        body: |
          ### 🚀 ImmortalWrt Firmware Build

          **Device**: `${{ matrix.device }}`
          **Version**: `${{ matrix.version }}`
          **Build ID**: `${{ github.run_id }}`
          **Build Date (CST)**: `${{ steps.get-date.outputs.date }}`
          **Date Tag**: `${{ steps.get-date.outputs.formatted_date }}`

          **Mirror Used**: `${{ steps.final-mirror-info.outputs.final_used_mirror }}`

          ### 📦 Files Included:
          - Firmware files with date tag: `${{ steps.get-date.outputs.formatted_date }}`
          - SHA256 hash verification file: `sha256sums.txt`
          - Detailed hash files (`.hashes`) for each firmware

          ### 🔐 SHA256 Checksums:
          ```
          ${{ steps.calculate-hashes.outputs.sha256_content }}
          ```

          ### 📝 Other Hash Algorithms:
          Each firmware file has a corresponding `.hashes` file containing:
          - SHA512
          - MD5
          - BLAKE2
          - SHA1
          - SM3 (国密，如果可用)

          Download the `.hashes` files for complete verification.

          ---
          🔧 Built with GitHub Actions at `${{ steps.get-date.outputs.date }}` (CST)

          📅 Date format in filenames: `${{ steps.get-date.outputs.formatted_date }}` (YYYYMMDDHHMMSS)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
